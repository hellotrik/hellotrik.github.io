<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css" crossorigin="anonymous">
    <link rel="stylesheet" href="./index.css">
    <title>千字文</title>
</head>
<body>
    <div class="audio-player" title="一腔诗意喂了狗">
        <div class="audio-player__meta">
            <span class="audio-player__label">一腔诗意喂了狗</span>
            <span class="audio-player__hint">Plyr · 倍速 / 音量 / 进度</span>
        </div>
        <audio id="qianziwen-audio" playsinline preload="metadata">
            <source src="/一腔诗意喂了狗.mp3" type="audio/mpeg">
        </audio>
    </div>
    <p class="text"></p>
    <div class="clock"></div>
    <div class="btn" onclick="btnClick()"></div>
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.min.js" crossorigin="anonymous"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var el = document.getElementById('qianziwen-audio');
            if (!el || typeof Plyr === 'undefined') return;
            new Plyr(el, {
                controls: [
                    'play-large',
                    'play',
                    'progress',
                    'current-time',
                    'duration',
                    'mute',
                    'volume',
                    'settings'
                ],
                settings: ['speed'],
                speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] },
                invertTime: false,
                keyboard: { focused: true, global: false },
                tooltips: { controls: true, seek: true }
            });
        });
    </script>
    <script src="./index.js"></script>
</body>
</html>
